<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Theme — Eventify</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --orange: #FF8C00; --orange-deep: #ff4500; --orange-glow: rgba(255,140,0,0.35); }
        body { font-family: 'Inter', Arial, sans-serif; background: #080818; color: #fff; min-height: 100vh; overflow-x: hidden; }

        .mesh-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 80% 70% at 0% 0%,   rgba(255,100,0,0.18) 0%, transparent 55%),
                radial-gradient(ellipse 70% 80% at 100% 30%, rgba(100,50,255,0.15) 0%, transparent 55%),
                radial-gradient(ellipse 60% 60% at 50% 100%, rgba(0,150,255,0.10) 0%, transparent 55%),
                #080818;
        }
        .mesh-bg::before {
            content: ''; position: absolute; inset: 0;
            background-image:
                radial-gradient(circle 1.5px at 15% 20%, rgba(255,140,0,0.70) 0%, transparent 0%),
                radial-gradient(circle 1px  at 40% 60%, rgba(150,100,255,0.50) 0%, transparent 0%),
                radial-gradient(circle 1.5px at 75% 25%, rgba(0,200,255,0.50) 0%, transparent 0%),
                radial-gradient(circle 1px  at 90% 70%, rgba(255,140,0,0.45) 0%, transparent 0%),
                radial-gradient(circle 2px  at 60% 10%, rgba(255,200,0,0.55)  0%, transparent 0%),
                radial-gradient(circle 1px  at 30% 90%, rgba(0,255,200,0.40)  0%, transparent 0%);
            background-size: 23% 23%;
        }

        /* Navbar */
        .navbar-custom {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 56px;
            background: rgba(8,8,24,0.85);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(24px);
        }
        .logo-row { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-cube { width: 36px; height: 36px; position: relative; transform-style: preserve-3d; animation: spinCube 9s linear infinite; }
        @keyframes spinCube { 0% { transform: rotateX(20deg) rotateY(0deg); } 100% { transform: rotateX(20deg) rotateY(360deg); } }
        .cube-face { position: absolute; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 15px; color: #fff; border: 1px solid rgba(255,140,0,0.35); }
        .cf-front  { background: rgba(255,130,0,0.90); transform: translateZ(18px); }
        .cf-back   { background: rgba(200,80,0,0.70);  transform: rotateY(180deg) translateZ(18px); }
        .cf-left   { background: rgba(180,60,0,0.65);  transform: rotateY(-90deg) translateZ(18px); }
        .cf-right  { background: rgba(220,100,0,0.75); transform: rotateY(90deg)  translateZ(18px); }
        .cf-top    { background: rgba(255,160,0,0.85); transform: rotateX(90deg)  translateZ(18px); }
        .cf-bottom { background: rgba(160,50,0,0.55);  transform: rotateX(-90deg) translateZ(18px); }
        .logo-text { font-size: 1.25rem; font-weight: 800; color: #fff; }
        .logo-text span { color: var(--orange); }

        /* Page */
        .page-wrap { position: relative; z-index: 1; padding: 60px 24px 80px; }
        .page-header { text-align: center; margin-bottom: 48px; }
        .sec-tag {
            font-size: 10.5px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: var(--orange); margin-bottom: 12px;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .sec-tag::before { content: ''; display: block; width: 18px; height: 1.5px; background: var(--orange); }
        .page-header h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1.2px; margin-bottom: 10px; }
        .page-header p { font-size: 0.95rem; color: rgba(255,255,255,0.42); }
        .page-header .event-pill {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 14px; padding: 6px 16px; border-radius: 30px;
            background: rgba(255,140,0,0.10); border: 1px solid rgba(255,140,0,0.30);
            font-size: 12.5px; font-weight: 600; color: var(--orange);
        }

        .events-grid {
            max-width: 960px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
        }

        /* Theme card */
        .event-card {
            position: relative; border-radius: 20px; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.06);
            cursor: pointer; transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
            height: 220px;
        }
        .event-card:hover { transform: translateY(-4px); border-color: rgba(255,140,0,0.30); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .event-card.selected { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,140,0,0.20), 0 20px 50px rgba(0,0,0,0.5); }

        .event-card input[type="radio"] { display: none; }

        .event-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .event-card:hover img { transform: scale(1.06); }
        .event-card .overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(5,5,20,0.95) 0%, rgba(5,5,20,0.55) 48%, rgba(5,5,20,0.15) 100%);
        }
        .event-card .card-content {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 18px 22px;
            display: flex; align-items: flex-end; justify-content: space-between; gap: 12px;
        }
        .theme-text { display: flex; flex-direction: column; gap: 4px; }
        .event-name { font-size: 1rem; font-weight: 700; color: #fff; }
        .event-desc { font-size: 11.5px; font-weight: 400; color: rgba(255,255,255,0.55); line-height: 1.3; }
        .check-circle {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.25);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .event-card.selected .check-circle {
            background: var(--orange); border-color: var(--orange);
        }
        .check-circle i { font-size: 14px; color: #fff; opacity: 0; transition: opacity 0.2s; }
        .event-card.selected .check-circle i { opacity: 1; }

        .card-top-strip { position: absolute; top: 0; left: 0; right: 0; height: 2px; z-index: 2; background: linear-gradient(90deg, transparent, var(--orange), transparent); opacity: 0; transition: opacity 0.3s; }
        .event-card.selected .card-top-strip { opacity: 1; }

        .submit-wrap { max-width: 960px; margin: 28px auto 0; }
        .btn-submit {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--orange), var(--orange-deep));
            color: #fff; font-size: 15px; font-weight: 700;
            border: none; border-radius: 13px; cursor: pointer;
            box-shadow: 0 8px 28px var(--orange-glow); transition: all 0.25s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(255,140,0,0.50); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        @media (max-width: 640px) {
            .events-grid { grid-template-columns: 1fr; }
            .navbar-custom { padding: 14px 20px; }
        }
    </style>
</head>
<body>
<div class="mesh-bg"></div>

<nav class="navbar-custom">
    <a class="logo-row" href="main.html">
        <div class="logo-cube">
            <div class="cube-face cf-front">E</div>
            <div class="cube-face cf-back"></div>
            <div class="cube-face cf-left"></div>
            <div class="cube-face cf-right"></div>
            <div class="cube-face cf-top"></div>
            <div class="cube-face cf-bottom"></div>
        </div>
        <span class="logo-text">Event<span>ify</span></span>
    </a>
</nav>

<div class="page-wrap">
    <div class="page-header">
        <div class="sec-tag">Step 3 of 3</div>
        <h1>Choose Your Event Theme ✨</h1>
        <p>Select a theme that matches your event style and atmosphere.</p>
        <div class="event-pill" id="eventPill"><i class="ti ti-sparkles"></i> <span id="eventPillText">Event</span></div>
    </div>

    <form action="pricing.html" method="get" id="themeForm">
        <div class="events-grid" id="themesGrid"></div>

        <div class="submit-wrap">
            <button type="submit" class="btn-submit" id="submitBtn" disabled>Continue — Select Pricing →</button>
        </div>
    </form>
</div>

<script>
    // Theme data organized by event type
    const themesByEvent = {
        "Wedding Ceremony": [
            { name: "Royal Luxury", emoji: "💎", desc: "Golden decoration with a grand, premium stage look", img: "https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=800&q=80" },
            { name: "Modern Elegant", emoji: "🤍", desc: "White theme with simple, classy decoration", img: "https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?w=800&q=80" },
            { name: "Garden Romance", emoji: "🌸", desc: "Outdoor flowers with a natural, romantic setup", img: "https://images.unsplash.com/photo-1519741497674-611481863552?w=800&q=80" },
            { name: "Traditional Culture", emoji: "🪔", desc: "Mehndi style with rich cultural decoration", img: "https://images.unsplash.com/photo-1583939003579-730e3918a45a?w=800&q=80" }
        ],
        "Birthday": [
            { name: "Kids Fun Theme", emoji: "🎈", desc: "Colorful balloons and playful decoration", img: "https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=800&q=80" },
            { name: "Princess Theme", emoji: "👑", desc: "Pink tones with magical fairy lights", img: "https://images.unsplash.com/photo-1551269901-5c5e14c25df7?w=800&q=80" },
            { name: "Luxury Birthday", emoji: "🥂", desc: "Premium birthday setup with elegant styling", img: "https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=800&q=80" },
            { name: "Neon Party", emoji: "🟣", desc: "Modern neon lights for a vibrant party vibe", img: "https://images.unsplash.com/photo-1496337589254-7e19d01cec44?w=800&q=80" }
        ],
        "Corporate": [
            { name: "Professional Business", emoji: "💼", desc: "Formal setup suited for business gatherings", img: "https://images.unsplash.com/photo-1505373877841-8d25f7d46678?w=800&q=80" },
            { name: "Tech Innovation", emoji: "💻", desc: "Digital screens with a sleek, modern look", img: "https://images.unsplash.com/photo-1531482615713-2afd69097998?w=800&q=80" },
            { name: "Conference Style", emoji: "🎤", desc: "Stage setup with structured audience seating", img: "https://images.unsplash.com/photo-1475721027785-f74eccf877e2?w=800&q=80" },
            { name: "Networking Lounge", emoji: "🛋️", desc: "Relaxed, professional environment for mingling", img: "https://images.unsplash.com/photo-1559136555-9303baea8ebd?w=800&q=80" }
        ],
        "Music Concert": [
            { name: "Neon Night", emoji: "🌃", desc: "Bold neon lighting for an electric atmosphere", img: "https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=800&q=80" },
            { name: "Festival Vibes", emoji: "🎪", desc: "Open festival setup with colorful energy", img: "https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=800&q=80" },
            { name: "DJ Party", emoji: "🎧", desc: "High-energy DJ booth with dynamic lighting", img: "https://images.unsplash.com/photo-1571266028243-d220c9c3b31c?w=800&q=80" },
            { name: "Outdoor Stage", emoji: "🌅", desc: "Open-air stage setup under the sky", img: "https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?w=800&q=80" }
        ]
    };

    // Fallback / default themes if event type not found
    const defaultThemes = [
        { name: "Minimal Style", emoji: "⚪", desc: "Clean, simple decoration with minimal elements", img: "https://images.unsplash.com/photo-1519167758481-83f550bb49b3?w=800&q=80" },
        { name: "Premium Theme", emoji: "✨", desc: "High-end decoration with a premium finish", img: "https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=800&q=80" },
        { name: "Modern Elegant", emoji: "🤍", desc: "White theme with simple, classy decoration", img: "https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?w=800&q=80" },
        { name: "Garden Theme", emoji: "🌿", desc: "Natural greenery and outdoor-inspired styling", img: "https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=800&q=80" }
    ];

    // Map other possible event type names (from event-selection page) to theme buckets
    const aliasMap = {
        "Art Exhibition": "Corporate",
        "Cultural Event": "Wedding Ceremony",
        "Outdoor Picnic": "Birthday"
    };

    // Get event type from URL params, fallback to localStorage
    const params = new URLSearchParams(window.location.search);
    let eventType = params.get('event') || localStorage.getItem('selectedEvent') || '';

    if (eventType) localStorage.setItem('selectedEvent', eventType);

    let themeKey = themesByEvent[eventType] ? eventType : aliasMap[eventType];
    let themes = themesByEvent[themeKey] || defaultThemes;

    document.getElementById('eventPillText').textContent = eventType ? eventType : 'Your Event';

    const grid = document.getElementById('themesGrid');
    const submitBtn = document.getElementById('submitBtn');

    themes.forEach((theme, i) => {
        const id = 'theme' + i;
        const label = document.createElement('label');
        label.className = 'event-card';
        label.id = 'card-' + id;
        label.setAttribute('for', id);
        label.innerHTML = `
            <div class="card-top-strip"></div>
            <img src="${theme.img}" alt="${theme.name}">
            <div class="overlay"></div>
            <input type="radio" id="${id}" name="theme" value="${theme.name}" ${i === 0 ? '' : ''}>
            <div class="card-content">
                <div class="theme-text">
                    <span class="event-name">${theme.emoji} ${theme.name}</span>
                    <span class="event-desc">${theme.desc}</span>
                </div>
                <div class="check-circle"><i class="ti ti-check"></i></div>
            </div>
        `;
        grid.appendChild(label);
    });

    document.querySelectorAll('.event-card').forEach(card => {
        card.addEventListener('click', function() {
            document.querySelectorAll('.event-card').forEach(c => c.classList.remove('selected'));
            this.classList.add('selected');
            submitBtn.disabled = false;
        });
    });

    document.getElementById('themeForm').addEventListener('submit', function(e) {
        const checked = document.querySelector('input[name="theme"]:checked');
        if (checked) localStorage.setItem('selectedTheme', checked.value);
    });
</script>
</body>
</html>
